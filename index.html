<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matej Záň — All Sites</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            color: #666;
            margin-bottom: 3rem;
            font-size: 0.9rem;
        }
        #sites {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            justify-items: center;
        }
        .site {
            background: #151515;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .site:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .thumbnail {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #222 0%, #111 100%);
            overflow: hidden;
            position: relative;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumbnail.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .info {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .site-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.4rem;
        }
        .site-desc {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 0.6rem;
            flex: 1;
        }
        .site-url {
            font-size: 0.75rem;
            color: #4a9eff;
            word-break: break-all;
            display: inline-block;
        }
        .loading {
            text-align: center;
            color: #555;
            padding: 2rem;
        }
        @media (max-width: 500px) {
            body { padding: 2rem 1rem; }
            h1 { font-size: 1.5rem; }
            #sites { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>All Sites</h1>
    <p class="subtitle">Auto-updated from GitHub Pages</p>
    <div id="sites"><p class="loading">Loading...</p></div>

    <script>
        const OWNER = 'matejzan-ai';

        const SITES = [
            { name: 'Drzanlabs', desc: 'IT Support & AI Automation', repo: 'drzanlabs' },
            { name: 'Rambala Stolarstvo', desc: 'Premium woodworking business website', repo: 'rambala-stolarstvo' }
        ];

        async function getScreenshot(url) {
            try {
                // Používaj Open Graph image ak existuje
                const res = await fetch(url);
                const html = await res.text();
                const ogMatch = html.match(/<meta property="og:image" content="([^"]+)"/);
                if (ogMatch && ogMatch[1]) {
                    return ogMatch[1];
                }
            } catch (e) {}
            return null;
        }

        async function load() {
            const container = document.getElementById('sites');

            const sitesWithImages = await Promise.all(
                SITES.map(async (s) => {
                    const url = `https://${OWNER}.github.io/${s.repo}/`;
                    const image = await getScreenshot(url);
                    return {
                        name: s.name,
                        desc: s.desc,
                        url: url,
                        image: image
                    };
                })
            );

            container.innerHTML = sitesWithImages.map(s => `
                <a href="${s.url}" class="site" target="_blank">
                    <div class="thumbnail ${s.image ? '' : 'loading'}">
                        ${s.image ? `<img src="${s.image}" alt="${s.name}" onerror="this.parentElement.classList.add('loading')">` : '<div style="width:100%; height:100%; background: linear-gradient(135deg, #222 0%, #111 100%);"></div>'}
                    </div>
                    <div class="info">
                        <div class="site-name">${s.name}</div>
                        ${s.desc ? `<div class="site-desc">${s.desc}</div>` : ''}
                        <div class="site-url">${s.url}</div>
                    </div>
                </a>
            `).join('');
        }

        load();
    </script>
</body>
</html>
