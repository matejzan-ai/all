<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matej Záň — All Sites</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 3rem;
            font-size: 0.9rem;
        }
        #sites {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        .site {
            background: #151515;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
        }
        .site:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .preview {
            width: 100%;
            height: 240px;
            overflow: hidden;
            position: relative;
            background: #111;
        }
        .preview iframe {
            width: 1280px;
            height: 800px;
            border: none;
            transform: scale(0.3);
            transform-origin: top left;
            pointer-events: none;
        }
        .info {
            padding: 1rem 1.2rem;
        }
        .site-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.3rem;
        }
        .site-desc {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 0.4rem;
        }
        .site-url {
            font-size: 0.78rem;
            color: #4a9eff;
        }
        .loading {
            text-align: center;
            color: #555;
            padding: 2rem;
            grid-column: 1 / -1;
        }
        @media (max-width: 500px) {
            body { padding: 2rem 1rem; }
            h1 { font-size: 1.5rem; }
            #sites { grid-template-columns: 1fr; }
            .preview iframe { transform: scale(0.25); }
            .preview { height: 200px; }
        }
    </style>
</head>
<body>
    <h1>All Sites</h1>
    <p class="subtitle">Auto-updated from GitHub Pages</p>
    <div id="sites"><p class="loading">Loading...</p></div>

    <script>
        const OWNER = 'matejzan-ai';
        const IGNORE = ['all'];

        async function load() {
            const container = document.getElementById('sites');
            try {
                const res = await fetch(`https://api.github.com/users/${OWNER}/repos?per_page=100&sort=updated`);
                const repos = await res.json();

                const sites = repos
                    .filter(r => r.has_pages && !IGNORE.includes(r.name))
                    .map(r => ({
                        name: r.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                        desc: r.description || '',
                        url: `https://${OWNER}.github.io/${r.name}/`
                    }));

                if (sites.length === 0) {
                    container.innerHTML = '<p class="loading">No sites found.</p>';
                    return;
                }

                container.innerHTML = sites.map(s => `
                    <a href="${s.url}" class="site" target="_blank">
                        <div class="preview">
                            <iframe src="${s.url}" loading="lazy" sandbox="allow-scripts allow-same-origin" tabindex="-1"></iframe>
                        </div>
                        <div class="info">
                            <div class="site-name">${s.name}</div>
                            ${s.desc ? `<div class="site-desc">${s.desc}</div>` : ''}
                            <div class="site-url">${s.url}</div>
                        </div>
                    </a>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="loading">Failed to load sites.</p>';
            }
        }

        load();
    </script>
</body>
</html>
